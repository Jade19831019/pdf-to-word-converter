<!DOCTYPE html>
<html>
<head>
    <title>ConvertAPI 测试 - 官方版</title>
    <meta charset="utf-8">
</head>
<body>
    <h1>PDF to Word 测试 - ConvertAPI官方版</h1>
    
    <input type="file" id="fileInput" accept=".pdf">
    <button onclick="testConvert()">开始转换</button>
    
    <div id="result"></div>
    
    <!-- 引入ConvertAPI官方库 -->
    <script src="https://cdn.convertapi.com/js/convertapi-2.0.js"></script>
    
    <script>
        const convertApiSecret = 'Xy4IX8NQtXKUAyjezmZ7G1o4rvTH0R8A';
        
        // 初始化ConvertAPI
        const convertApi = new ConvertApi(convertApiSecret);
        
        async function testConvert() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('请先选择PDF文件');
                return;
            }
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>⏳ 正在转换中，请稍候...</p>';
            
            try {
                console.log('开始转换文件:', file.name);
                
                // 使用ConvertAPI官方库转换
                const result = await convertApi.convert('pdf', 'docx', {
                    File: file
                });
                
                console.log('转换成功！结果:', result);
                
                // 获取文件信息
                const fileData = result.files[0];
                const downloadUrl = fileData.url;
                const fileName = fileData.fileName;
                const fileSize = fileData.fileSize || '未知';
                
                resultDiv.innerHTML = `
                    <h3 style="color: green;">✅ 转换成功！</h3>
                    <p><strong>文件名:</strong> ${fileName}</p>
                    <p><strong>文件大小:</strong> ${fileSize} 字节</p>
                    <p><strong>下载链接:</strong></p>
                    <p style="background: #f0f0f0; padding: 10px; word-break: break-all;">
                        <a href="${downloadUrl}" target="_blank">${downloadUrl}</a>
                    </p>
                    <div style="margin-top: 20px;">
                        <h4>下载方式：</h4>
                        <p style="margin: 10px 0;">
                            <a href="${downloadUrl}" target="_blank" 
                               style="padding: 12px 24px; background: #007bff; color: white; 
                                      text-decoration: none; border-radius: 6px; font-size: 16px;
                                      display: inline-block;">
                               🚀 方式1：新窗口打开
                            </a>
                        </p>
                        <p style="margin: 10px 0;">
                            <a href="${downloadUrl}" download="${fileName}"
                               style="padding: 12px 24px; background: #28a745; color: white; 
                                      text-decoration: none; border-radius: 6px; font-size: 16px;
                                      display: inline-block;">
                               📥 方式2：直接下载
                            </a>
                        </p>
                    </div>
                    <p style="margin-top: 20px; color: #666; font-size: 14px;">
                        💡 提示：如果文件无法打开，请尝试"右键 → 链接另存为..."
                    </p>
                `;
                
            } catch (error) {
                console.error('转换失败:', error);
                resultDiv.innerHTML = `
                    <h3 style="color: red;">❌ 转换失败</h3>
                    <p><strong>错误信息:</strong></p>
                    <pre style="background: #ffe6e6; padding: 15px;">${error.message || JSON.stringify(error, null, 2)}</pre>
                `;
            }
        }
    </script>
</body>
</html>

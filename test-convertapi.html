
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试 ConvertAPI</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .section { margin: 20px 0; padding: 20px; background: #f5f5f5; border-radius: 10px; }
        button { background: #667eea; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #5a67d8; }
        input[type="file"] { margin: 10px 0; }
        #log { background: #1e1e1e; color: #00ff00; padding: 15px; border-radius: 8px; font-family: monospace; max-height: 400px; overflow-y: auto; margin-top: 20px; }
        .error { color: #ff6b6b; }
        .success { color: #51cf66; }
    </style>
</head>
<body>
    <h1>🔧 ConvertAPI 测试页面</h1>
    
    <div class="section">
        <h2>1. 先测试 API Key 是否有效</h2>
        <button id="btnTestKey">测试 API Key</button>
    </div>
    
    <div class="section">
        <h2>2. 选择 PDF 文件测试转换</h2>
        <input type="file" id="fileInput" accept=".pdf">
        <button id="btnTestConvert">测试转换</button>
    </div>
    
    <div class="section">
        <h2>3. 快速链接</h2>
        <p><a href="index.html" target="_blank">→ 回到主页面</a></p>
    </div>
    
    <div id="log">
        <div>=== 测试日志 ===</div>
    </div>

    <script>
        const convertApiKey = 'Xy4IX8NQtXKUAyjezmZ7G1o4rvTH0R8A';
        let selectedFile = null;
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const colorClass = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
            logDiv.innerHTML += `<div class="${colorClass}">[${time}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        document.getElementById('fileInput').addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                log(`已选择文件: ${selectedFile.name} (${formatFileSize(selectedFile.size)})`, 'success');
            }
        });
        
        document.getElementById('btnTestKey').addEventListener('click', async () => {
            log('开始测试 ConvertAPI Key...');
            try {
                const response = await fetch(`https://v2.convertapi.com/user?Secret=${convertApiKey}`);
                const data = await response.json();
                log('ConvertAPI 用户信息: ' + JSON.stringify(data, null, 2), 'success');
            } catch (error) {
                log('API Key 测试失败: ' + error.message, 'error');
                console.error(error);
            }
        });
        
        document.getElementById('btnTestConvert').addEventListener('click', async () => {
            if (!selectedFile) {
                log('请先选择文件！', 'error');
                return;
            }
            log('开始转换测试...');
            try {
                const formData = new FormData();
                formData.append('File', selectedFile);
                
                log('文件准备就绪，正在发送到 ConvertAPI...');
                
                const response = await fetch(`https://v2.convertapi.com/convert/pdf/to/docx?Secret=${convertApiKey}`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                log('ConvertAPI 完整响应:', 'info');
                console.log('ConvertAPI Result:', result);
                
                if (result.Files && result.Files.length > 0) {
                    log('✅ 转换成功！', 'success');
                    log('下载链接: ' + result.Files[0].Url, 'success');
                    log('文件名: ' + result.Files[0].FileName, 'success');
                    
                    log('正在尝试下载...');
                    window.open(result.Files[0].Url, '_blank');
                } else {
                    log('❌ 转换失败: ' + (result.Message || '未知错误'), 'error');
                }
            } catch (error) {
                log('转换失败: ' + error.message, 'error');
                console.error(error);
            }
        });
        
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        log('测试页面加载完成！');
    </script>
</body>
</html>

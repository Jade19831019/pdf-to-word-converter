# Cloudflare Workers 配置
name = "pdf-to-word-converter"
main = "_worker.js"
compatibility_date = "2024-01-01"

# Cloudflare KV 命名空间
[[kv_namespaces]]
binding = "USERS_KV"
id = "your-kv-namespace-id"  # 需要替换

# 环境变量
[vars]
CONVERT_API_KEY = "your-convert-api-key"  # 需要替换
PAYPAL_CLIENT_ID = "your-paypal-client-id"  # 需要替换
PAYPAL_CLIENT_SECRET = "your-paypal-client-secret"  # 需要替换
